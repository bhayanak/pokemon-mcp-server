<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="pokeball-top" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444"/>
      <stop offset="100%" style="stop-color:#cc0000"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#3a7bd5"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="32" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="64" x2="256" y2="64"/>
    <line x1="0" y1="128" x2="256" y2="128"/>
    <line x1="0" y1="192" x2="256" y2="192"/>
    <line x1="64" y1="0" x2="64" y2="256"/>
    <line x1="128" y1="0" x2="128" y2="256"/>
    <line x1="192" y1="0" x2="192" y2="256"/>
  </g>

  <!-- Pokéball icon -->
  <g transform="translate(128, 100)" filter="url(#shadow)">
    <!-- Ball outline -->
    <circle cx="0" cy="0" r="48" fill="none" stroke="#fff" stroke-width="3" opacity="0.9"/>
    <!-- Top half (red) -->
    <path d="M -48 0 A 48 48 0 0 1 48 0" fill="url(#pokeball-top)" opacity="0.9"/>
    <!-- Bottom half (white) -->
    <path d="M -48 0 A 48 48 0 0 0 48 0" fill="#f0f0f0" opacity="0.9"/>
    <!-- Center band -->
    <rect x="-48" y="-3" width="96" height="6" fill="#333" opacity="0.8"/>
    <!-- Center button outer -->
    <circle cx="0" cy="0" r="14" fill="#444" stroke="#333" stroke-width="2"/>
    <!-- Center button inner with glow -->
    <circle cx="0" cy="0" r="9" fill="url(#accent)" filter="url(#glow-filter)"/>
    <!-- Center button highlight -->
    <circle cx="-2" cy="-3" r="3" fill="#fff" opacity="0.6"/>
  </g>

  <!-- MCP connection lines -->
  <g stroke="url(#accent)" stroke-width="1.5" opacity="0.4">
    <line x1="40" y1="70" x2="80" y2="90"/>
    <line x1="216" y1="70" x2="176" y2="90"/>
    <line x1="40" y1="130" x2="80" y2="110"/>
    <line x1="216" y1="130" x2="176" y2="110"/>
  </g>
  <!-- Connection dots -->
  <g fill="url(#accent)" opacity="0.6">
    <circle cx="36" cy="68" r="3"/>
    <circle cx="220" cy="68" r="3"/>
    <circle cx="36" cy="132" r="3"/>
    <circle cx="220" cy="132" r="3"/>
  </g>

  <!-- "PokéAPI" text -->
  <text x="128" y="178" text-anchor="middle" font-family="'Segoe UI', 'SF Pro Display', Arial, sans-serif" font-size="26" font-weight="800" fill="#fff" letter-spacing="1" filter="url(#shadow)">PokéAPI</text>

  <!-- "MCP SERVER" text -->
  <text x="128" y="204" text-anchor="middle" font-family="'Segoe UI', 'SF Pro Display', Arial, sans-serif" font-size="16" font-weight="600" fill="url(#accent)" letter-spacing="4">MCP SERVER</text>

  <!-- Version accent line -->
  <rect x="78" y="214" width="100" height="2" rx="1" fill="url(#accent)" opacity="0.3"/>

  <!-- Corner accents -->
  <path d="M 20 12 L 20 20 L 12 20" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.4"/>
  <path d="M 236 12 L 236 20 L 244 20" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.4"/>
  <path d="M 20 244 L 20 236 L 12 236" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.4"/>
  <path d="M 236 244 L 236 236 L 244 236" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.4"/>
</svg>
